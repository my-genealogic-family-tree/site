	var modal = document.getElementById("myModal");
	function closemodal() {
		modal.style.display = "none";
		currpos = 0;
	}
	var spanback = document.getElementsByClassName("back")[0];
	spanback.onclick = function() {
		if( currpos > 1 ) {
			window.history.back();
			currpos -= 2;
		}
		else
			closemodal();
	}
	var spanx = document.getElementsByClassName("close")[0];
	spanx.onclick = function() { closemodal(); }
	var spantree = document.getElementsByClassName("tree")[0];
	spantree.onclick = function() {
		closemodal();
		var elmnt = document.getElementById(currgid);
		elmnt.scrollIntoView();
	}
	nodeclick = function(i) {
		document.getElementById("modalContent").innerHTML = '<iframe id="idetail" onload="currpos+=1;" src="Adamyan.html.files/p' + i + '.html?s=40e6351f6a3a99a1" class="modal-frame"></iframe>';
		modal.style.display = "block";
	}
	window.onclick = function(event) {
		if (event.target == modal)
			closemodal();
	}
</script>
