	function closemodal() {
		modal.style.display = "none";
		currpos = 0;
	}
	var spanback = document.getElementsByClassName("back")[0];
	spanback.onclick = function() {
		if( currpos > 1 ) {
			window.history.back();
			currpos -= 2;
		}
		else
			closemodal();
	}
	var spanx = document.getElementsByClassName("close")[0];
	spanx.onclick = function() { closemodal(); }

		closemodal();

		elmnt.scrollIntoView();
	}

	}
	window.onclick = function(event) {
		if (event.target == modal)
			closemodal();
	}
</script>
