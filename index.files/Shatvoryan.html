		modal.style.display = "none";

		if( currpos > 1 ) {

			closemodal();
	}
	var spanx = document.getElementsByClassName("close")[0];

	}
	window.onclick = function(event) {
		if (event.target == modal)
			closemodal();
	}
</script>
